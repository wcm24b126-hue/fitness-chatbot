<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Mike | AI Fitness Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff7ed; }
        
        /* Smooth Fade-In Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        .markdown-body p { margin-bottom: 0.8rem; }
        .markdown-body strong { color: #ea580c; font-weight: 700; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-2 sm:p-6">

    <div class="w-full max-w-3xl bg-white/80 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden flex flex-col h-full max-h-[850px] border border-orange-100">
        
        <div class="bg-slate-900 p-6 flex items-center shadow-lg border-b-4 border-orange-500">
            <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center text-2xl mr-4 shadow-md rotate-3">💪</div>
            <div>
                <h1 class="text-white font-bold text-xl tracking-tight uppercase">Iron Mike Coach</h1>
                <div class="flex items-center text-orange-200 text-xs font-semibold">
                    <span class="w-2 h-2 bg-orange-500 rounded-full mr-2 animate-ping"></span> NO EXCUSES MODE
                </div>
            </div>
        </div>

        <div id="chat-box" class="flex-1 p-4 sm:p-8 overflow-y-auto bg-slate-50/30 space-y-6 scrollbar-hide">
            <div class="flex items-start message-fade">
                <div class="bg-white p-5 rounded-2xl rounded-tl-none shadow-sm text-slate-700 max-w-[90%] border border-orange-50 ring-1 ring-black/5">
                    Drop and give me twenty! 🏋️‍♂️ <br><br>I'm **Iron Mike**. I'm here to crush your fitness goals. What's the plan today?
                </div>
            </div>
        </div>

        <div class="p-4 sm:p-6 bg-white/50 border-t border-slate-100">
            <form id="chat-form" class="flex items-center space-x-3 bg-white p-2 rounded-2xl border border-slate-200 focus-within:ring-2 focus-within:ring-orange-500 transition-all shadow-inner">
                <input type="text" id="chat-input" required
                    class="flex-1 bg-transparent px-4 py-3 focus:outline-none text-slate-700 placeholder-slate-400 font-medium" 
                    placeholder="Tell me your workout goal...">
                <button type="submit" id="send-btn"
                    class="bg-orange-600 text-white rounded-xl h-12 w-12 flex items-center justify-center hover:bg-orange-700 transition-all active:scale-95 disabled:opacity-50 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://dark-voice-9f2f.wcm24b126.workers.dev';
        const sessionId = 'fitness-' + Math.random().toString(36).substring(2, 15);

        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('send-btn');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            chatInput.value = '';
            const loadingId = appendLoading();
            sendBtn.disabled = true;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: text, sessionId: sessionId })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();
                
                const botReply = data.output || data.text || "Keep training! I'm just catching my breath.";
                appendMessage(botReply, 'bot');

            } catch (error) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                appendMessage("**Coach Error:** Can't reach the servers. Don't let that stop your set!", 'bot');
            } finally {
                sendBtn.disabled = false;
            }
        });

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'flex items-end justify-end message-fade' : 'flex items-start message-fade';
            
            const innerDiv = document.createElement('div');
            if (sender === 'user') {
                innerDiv.className = 'bg-orange-600 text-white p-4 rounded-2xl rounded-tr-none shadow-md max-w-[85%] font-semibold';
                innerDiv.textContent = text;
            } else {
                innerDiv.className = 'bg-white p-5 rounded-2xl rounded-tl-none shadow-sm text-slate-700 max-w-[90%] border border-orange-50 markdown-body ring-1 ring-black/5 leading-relaxed';
                innerDiv.innerHTML = marked.parse(text);
            }

            div.appendChild(innerDiv);
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function appendLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex items-start message-fade';
            div.innerHTML = `<div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 flex space-x-1 items-center w-16 h-10">
                <div class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce" style="animation-delay:0.2s"></div>
                <div class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce" style="animation-delay:0.4s"></div>
            </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            return id;
        }
    </script>
</body>
</html>
